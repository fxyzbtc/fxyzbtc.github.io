name: Sync Issues to Index

on:
  issues:
    types: [opened, closed, deleted, unlabeled, labeled, edited]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: pip install markdown2
      
      - name: Sync Issues
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python3 bin/gen.py
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Sync index.md from issues"
          git push
